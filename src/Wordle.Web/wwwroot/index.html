<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wordle</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>WORDLE</h1>
        <button id="new-game" type="button">Nouvelle partie</button>
    </header>

    <main>
        <div id="message" class="message" role="status" aria-live="polite"></div>
        <div id="board" class="board" aria-label="Grille de jeu"></div>
        <div id="keyboard" class="keyboard" aria-label="Clavier"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
